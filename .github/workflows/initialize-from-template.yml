name: Initialize from Template
on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Django app name'
        required: true
        default: 'django-app'
      module_name:
        description: 'Python module name. If the project name is django-app, usually the module name will be django_app or just app.'
        required: true
        default: 'django_app'
      project_description:
        description: 'Brief description for your Django app'
        required: true
        default: 'A Django app that ...'

jobs:
  initialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if already initialized
        id: check
        run: |
          if [ ! -f .is-template ]; then
            echo "Already initialized"
            exit 0
          fi
          echo "needs_init=true" >> $GITHUB_OUTPUT

      - name: Setup Python
        if: steps.check.outputs.needs_init == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install copier
        if: steps.check.outputs.needs_init == 'true'
        run: pip install copier hatch

      - name: Render template
        if: steps.check.outputs.needs_init == 'true'
        env:
          PNAME: ${{ github.event.inputs.project_name }}
          MNAME: ${{ github.event.inputs.module_name }}
          PDESC: ${{ github.event.inputs.project_description }}
        run: |
          mkdir -p /tmp/out
          copier copy --force --trust \
            --data project_name="$PNAME" \
            --data module_name="$MNAME" \
            --data project_description="$PDESC" \
            . /tmp/out

      - name: Replace files
        if: steps.check.outputs.needs_init == 'true'
        run: |
          rm -rf src/
          cp -r /tmp/out/. .
          rm -f .is-template
          sed -i "s|matagus/{{ project_name }}|${{ github.repository }}|g" README.md

      - name: Commit
        if: steps.check.outputs.needs_init == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "Initialize: ${{ github.event.inputs.project_name }}"
          git push
